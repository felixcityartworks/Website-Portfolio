<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta Tags -->
    <title>Felix Uwakara | Frontend Developer & CS Student</title>
    <meta name="title" content="Felix Uwakara | Frontend Developer & CS Student" />
    <meta name="description" content="Portfolio of Felix Uwakara, a computer science student at Bingham University and frontend developer specializing in React, JavaScript, and modern web applications." />
    <meta name="keywords" content="Felix Uwakara, frontend developer, React developer, JavaScript, portfolio, Bingham University, web development, Nigeria" />
    <meta name="author" content="Felix Uwakara" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Felix Uwakara | Frontend Developer" />
    <meta property="og:description" content="Portfolio of Felix Uwakara, a computer science student and frontend developer specializing in React and modern web applications." />
    <meta property="og:image" content="/profile.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Felix Uwakara | Frontend Developer" />
    <meta name="twitter:description" content="Portfolio of Felix Uwakara, a computer science student and frontend developer specializing in React and modern web applications." />
    <meta name="twitter:image" content="/profile.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://website-portfolio-six-steel.vercel.app/" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Dark Mode FOUC Prevention -->
    <script>
      (function() {
        try {
          var localTheme = localStorage.getItem('theme');
          var theme = localTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'dark');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
